<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos | José Rodrigues Mina</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #0d0d0d; --surface-color: #1a1a1a; --text-primary: #f2f2f2; --accent-color: #007acc; --border-color: #333333; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-primary); }
        
        body.lang-en .pt { display: none !important; }
        body.lang-pt .en { display: none !important; }

        nav { position: sticky; top: 0; background: rgba(13, 13, 13, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); z-index: 1000; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; }
        .nav-links a { color: var(--text-primary); text-decoration: none; margin-right: 25px; font-weight: 600; font-size: 0.9rem; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 60px 30px; }
        h1 { font-size: 2.5rem; margin-bottom: 40px; }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; }
        .gallery-item { background: var(--surface-color); border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color); transition: 0.3s; }
        .gallery-item:hover { transform: translateY(-5px); border-color: var(--accent-color); }
        .gallery-item img { width: 100%; height: 250px; object-fit: cover; }
        .gallery-content { padding: 20px; }
        .gallery-content h3 { font-size: 1.1rem; margin-bottom: 5px; }

        .lang-toggle { background: var(--surface-color); color: #fff; border: 1px solid var(--border-color); padding: 8px 15px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body class="lang-pt">

    <nav>
        <div class="nav-links">
            <a href="index.html" class="en">← Home</a>
            <a href="index.html" class="pt">← Início</a>
        </div>
        <button class="lang-toggle" onclick="toggleLanguage()">EN / PT</button>
    </nav>

    <div class="container">
        <h1 class="en">Event Gallery</h1>
        <h1 class="pt">Galeria de Eventos</h1>

        <div class="gallery-grid">
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1505236858219-8359eb29e329?w=800" alt="JMJ 2023">
                <div class="gallery-content">
                    <h3 class="en">World Youth Day 2023</h3>
                    <h3 class="pt">Jornada Mundial da Juventude 2023</h3>
                    <p style="color:var(--accent-color); font-size: 0.8rem;">Reforço Acústico / AoIP</p>
                </div>
            </div>

            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30?w=800" alt="Broadcast">
                <div class="gallery-content">
                    <h3 class="en">Broadcast Operations</h3>
                    <h3 class="pt">Operações de Broadcast</h3>
                    <p style="color:var(--accent-color); font-size: 0.8rem;">Live Streaming / TV</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleLanguage() {
            document.body.classList.toggle('lang-en');
            document.body.classList.toggle('lang-pt');
        }
    </script>
</body>
</html>
