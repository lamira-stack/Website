<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>José Rodrigues Mina | AV Systems Engineer</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0d0d0d;
            --surface-color: #1a1a1a;
            --surface-hover: #242424;
            --text-primary: #f2f2f2;
            --text-secondary: #a0a0a0;
            --accent-color: #007acc;
            --accent-hover: #005bb5;
            --border-color: #333333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            transition: background 0.3s ease;
        }

        /* LÓGICA DE TRADUÇÃO - CRÍTICO */
        body.lang-en .pt { display: none !important; }
        body.lang-pt .en { display: none !important; }

        .lang-toggle {
            position: fixed;
            top: 25px;
            right: 25px;
            background: var(--surface-color);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 10px 18px;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s ease;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .lang-toggle:hover {
            border-color: var(--accent-color);
            background: var(--surface-hover);
            transform: scale(1.05);
        }

        .container { max-width: 900px; margin: 0 auto; padding: 80px 30px; }

        header { margin-bottom: 80px; animation: fadeIn 1s ease-out; }
        h1 { font-size: 3rem; font-weight: 700; letter-spacing: -1px; margin-bottom: 5px; }
        .title-role { font-size: 1.1rem; font-weight: 600; color: var(--accent-color); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; display: block; }
        .hero-description { font-size: 1.2rem; color: var(--text-secondary); max-width: 650px; margin-bottom: 35px; font-weight: 300; }

        .btn {
            display: inline-block; background-color: var(--accent-color); color: #ffffff;
            padding: 14px 32px; border-radius: 6px; text-decoration: none; font-weight: 600;
            transition: all 0.3s ease; border: none; cursor: pointer;
        }
        .btn:hover { background-color: var(--accent-hover); transform: translateY(-2px); }

        section { margin-bottom: 70px; }
        .section-title { font-size: 1.5rem; font-weight: 600; color: #ffffff; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .card { background-color: var(--surface-color); border: 1px solid var(--border-color); border-radius: 8px; padding: 30px; transition: all 0.3s ease; }
        .card:hover { border-color: var(--accent-color); transform: translateY(-5px); background-color: var(--surface-hover); }
        .card h3 { font-size: 1.25rem; margin-bottom: 10px; color: #ffffff; }
        .card .event-date { font-size: 0.85rem; color: var(--accent-color); font-weight: 600; margin-bottom: 15px; display: block; }

        .skill-category { margin-bottom: 25px; }
        .skill-category h4 { color: var(--text-primary); margin-bottom: 12px; font-size: 1rem; }
        .tags { display: flex; flex-wrap: wrap; gap: 10px; }
        .tag { background-color: var(--surface-color); color: var(--text-secondary); border: 1px solid var(--border-color); padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }

        .timeline-item { margin-bottom: 25px; padding-left: 20px; border-left: 2px solid var(--border-color); }
        .timeline-item h4 { font-size: 1.1rem; color: #ffffff; }
        .timeline-item .company { color: var(--accent-color); font-weight: 600; font-size: 0.95rem; }
        .timeline-item .date { color: var(--text-secondary); font-size: 0.85rem; margin-left: 10px; }

        footer { margin-top: 100px; padding: 40px 0; border-top: 1px solid var(--border-color); text-align: center; color: var(--text-secondary); font-size: 0.9rem; }
        .social-links a { color: var(--text-secondary); text-decoration: none; margin: 0 10px; transition: color 0.3s; }
        .social-links a:hover { color: var(--accent-color); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 600px) { h1 { font-size: 2.2rem; } .container { padding: 60px 20px; } }
    </style>
