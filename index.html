<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>José Rodrigues Mina | AV Systems Engineer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-color: #0a0a0a; 
            --surface-color: #141414; 
            --text-primary: #ffffff; 
            --text-secondary: #94a3b8; 
            --accent-color: #3b82f6; 
            --border-color: #262626;
            --card-hover: #1c1c1c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-primary); 
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Lógica de Tradução */
        body.lang-en .pt { display: none !important; }
        body.lang-pt .en { display: none !important; }

        /* Navegação */
        nav { 
            position: fixed; top: 0; width: 100%; 
            background: rgba(10, 10, 10, 0.8); 
            backdrop-filter: blur(12px); 
            border-bottom: 1px solid var(--border-color); 
            z-index: 1000; padding: 15px 40px; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .nav-links a { 
            color: var(--text-secondary); text-decoration: none; 
            margin-right: 30px; font-weight: 500; font-size: 0.85rem; 
            transition: 0.2s; text-transform: uppercase; letter-spacing: 1px;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--accent-color); }
        
        .lang-toggle { 
            background: var(--surface-color); color: var(--accent-color); 
            border: 1px solid var(--accent-color); padding: 6px 14px; 
            border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.75rem;
            transition: 0.3s;
        }
        .lang-toggle:hover { background: var(--accent-color); color: white; }

        .container { max-width: 1000px; margin: 0 auto; padding: 120px 40px 60px; }

        header { margin-bottom: 80px; border-left: 3px solid var(--accent-color); padding-left: 30px; }
        h1 { font-size: 3.5rem; font-weight: 800; letter-spacing: -2px; line-height: 1; margin-bottom: 15px; }
        
        /* SUBTÍTULO CORRIGIDO */
        .title-role { 
            font-family: 'JetBrains Mono', monospace; color: var(--accent-color); 
            font-size: 1rem; font-weight: 500; display: block; margin-bottom: 25px; 
        }
        
        .hero-description { font-size: 1.25rem; color: var(--text-secondary); max-width: 700px; font-weight: 300; }

        section { margin-bottom: 80px; }
        .section-header { 
            display: flex; align-items: center; margin-bottom: 40px; 
            gap: 20px; color: var(--text-secondary); font-size: 0.8rem; 
            text-transform: uppercase; letter-spacing: 3px; 
        }
        .section-header::after { content: ""; height: 1px; flex-grow: 1; background: var(--border-color); }

        /* Experiência */
        .exp-card { 
            background: var(--surface-color); padding: 40px; 
            border-radius: 12px; border: 1px solid var(--border-color);
            transition: 0.3s ease; margin-bottom: 20px;
        }
        .exp-card:hover { border-color: #404040; background: var(--card-hover); }
        .exp-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .exp-title h3 { font-size: 1.4rem; color: #fff; }
        .exp-title p { color: var(--accent-color); font-weight: 600; font-size: 0.9rem; }
        .exp-date { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: var(--text-secondary); }
        
        .bullets { list-style: none; margin-top: 20px; }
        .bullets li { 
            color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 12px; 
            padding-left: 20px; position: relative; 
        }
        .bullets li::before { content: "→"; position: absolute; left: 0; color: var(--accent-color); }

        /* COMPETÊNCIAS - NOVO DESIGN */
        .skills-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .skill-item { 
            background: var(--surface-color); padding: 30px; 
            border-radius: 12px; border: 1px solid var(--border-color);
            display: flex; flex-direction: column; gap: 15px;
        }
        .skill-item h4 { 
            font-size: 0.85rem; color: var(--accent-color); 
            text-transform: uppercase; letter-spacing: 1px;
            border-bottom: 1px solid #262626; padding-bottom: 10px;
        }
        .skill-list { list-style: none; }
        .skill-list li { font-size: 0.95rem; color: var(--text-primary); margin-bottom: 8px; display: flex; justify-content: space-between; }
        .skill-list li span { color: var(--text-secondary); font-size: 0.8rem; }

        /* Galeria CTA */
        .gallery-cta { 
            background: linear-gradient(90deg, #1d4ed8 0%, #1e40af 100%); 
            padding: 50px; border-radius: 12px; text-align: center; margin-top: 40px;
        }
        .btn-white { 
            display: inline-block; background: #fff; color: #000; 
            padding: 14px 30px; border-radius: 6px; text-decoration: none; 
            font-weight: 700; transition: 0.3s; margin-top: 20px;
        }
        .btn-white:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        footer { text-align: center; padding: 60px; border-top: 1px solid var(--border-color); color: var(--text-secondary); font-size: 0.8rem; }
    </style>
</head>
<body class="lang-pt">

    <nav>
        <div class="nav-links">
            <a href="index.html" class="active">Home</a>
            <a href="eventos.html" class="en">Portfolio</a>
            <a href="eventos.html" class="pt">Portefólio</a>
        </div>
        <button class="lang-toggle" onclick="toggleLanguage()">PT / EN</button>
    </nav>

    <div class="container">
        <header>
            <span class="title-role en">AV Systems Engineer // Team Lead</span>
            <span class="title-role pt">Engenheiro de Sistemas AV // Team Lead</span>
            
            <h1>José Rodrigues Mina</h1>
            <p class="hero-description en">Specialized in mission-critical AV infrastructure, AoIP network design, and live broadcast synchronization.</p>
